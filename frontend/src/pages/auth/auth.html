<!--
  Страница «Вход» (полноэкранная) — Alpine.js компонент.
  Логика в auth.js (Alpine.data('authPage', ...)).
-->
<div class="auth-container">
  <div class="auth-card" x-data="authPage" x-init="init($router)">
    <h2 class="auth-title">BTS Admin System</h2>
    <form @submit.prevent="submit()">
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input type="text" class="form-input" required autocomplete="username" x-model="username">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="pwd-field">
          <input :type="showPassword ? 'text' : 'password'"
                 class="form-input" required autocomplete="current-password" minlength="5"
                 x-model="password">
          <button type="button" class="pwd-toggle"
                  :aria-label="showPassword ? 'Скрыть пароль' : 'Показать пароль'"
                  @click="showPassword = !showPassword">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 x-show="!showPassword">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 x-show="showPassword">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Войти</button>
    </form>

    <div class="auth-message"
         :class="message.isError ? 'auth-message-error' : 'auth-message-success'"
         x-show="message.text"
         x-text="message.text"></div>
  </div>
</div>
